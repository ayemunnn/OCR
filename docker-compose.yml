services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:////data/papersleuth.db
      SECRET_KEY: change-this-secret-key-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      BACKEND_CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000","http://localhost:5173","http://127.0.0.1:5173"]'
    volumes:
      - backend_sqlite:/data
      - ./backend/storage:/app/storage

  frontend:
    image: node:20-alpine
    working_dir: /app
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

  postgres:
    image: postgres:16
    profiles:
      - postgres
    environment:
      POSTGRES_DB: papersleuth
      POSTGRES_USER: papersleuth
      POSTGRES_PASSWORD: papersleuth_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  backend_sqlite:
  frontend_node_modules:
  postgres_data:
